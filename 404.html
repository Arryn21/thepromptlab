<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — PromptLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --cyber: #00d4ff;
      --text: #f0f4ff;
      --muted: #5a6380;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 6rem;
      font-weight: 800;
      color: var(--cyber);
      line-height: 1;
      text-shadow: 0 0 40px rgba(0,212,255,0.4);
      margin-bottom: 16px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    p  { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--cyber);
      color: var(--bg);
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #fff; }
    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 48px;
      opacity: 0.4;
    }
    .logos img { height: 32px; filter: brightness(1.2); }
    .div { width: 1px; height: 28px; background: var(--border); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That page doesn't exist — but 57 great AI prompts do.<br>Head back to the workshop.</p>
    <a href="/" class="btn">⚡ Back to PromptLab</a>
    <div class="logos">
      <img src="assets/pictures/LIFT LAB.svg" alt="LIFT LAB">
      <div class="div"></div>
      <img src="assets/pictures/csudhlogo.webp" alt="CSUDH">
    </div>
  </div>
</body>
</html>
